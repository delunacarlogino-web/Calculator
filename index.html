<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grading System Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="app.js" defer></script>
    <style>
        body {
            background: radial-gradient(circle at 0% 0%, #dd7058 0%, #953b27 75%, #6f1a07 100%);
        }   
    </style>
</head>
<body class="vh-100 d-flex flex-column justify-content-center align-items-center">

    <div class="card p-4 shadow-sm" style="width: 450px;">
            <h3 class="card-title text-center mb-4">Multi-Button Calculator</h3>

        <div class="mb-3">
            <input type="text" id="num1" placeholder="First Number" class="rounded-3 form-control">
            
        </div>

        <div class="mb-3">
            <input type="text" id="num2" placeholder="Second Number" class="rounded-3 form-control">
        </div>

        <div class="row g-3 mb-3">
            <button id="addBtn" class="btn btn-secondary rounded-3">Add</button>
            <button id="subBtn" class="btn btn-secondary rounded-3">Subtract</button>
            <button id="mulBtn" class="btn btn-secondary rounded-3">Multiply</button>
            <button id="divBtn" class="btn btn-secondary rounded-3">Divide</button>
            <button id="clearBtn" class="btn btn-danger rounded-3">Clear</button>
        </div>

        <div class="p-3 bg-white border rounded text-center" id="output-matrix">
            <p id="resultText" style="font-weight: bold; margin-top: 15px;" class="mb-2">Result: </p>
            <p id="resultTextNote" style="font-weight: bold; margin-top: 15px;"></p>
        </div>
        
    </div>
</body>
</html>
